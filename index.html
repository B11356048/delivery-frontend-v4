<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>外送平台 v4</title>

<style>

body{
    font-family:Arial;
    margin:0;
    background:#f5f5f5;
}

header{
    background:#ff5722;
    color:white;
    padding:15px;
    text-align:center;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
}

input,
select,
button{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:10px;
}

button{
    background:#ff5722;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.hidden{
    display:none;
}

</style>

</head>
<body>

<header>
<h1>🍔 外送平台 v4</h1>
</header>

<div class="container">

<div class="card">

<h2>後端連線測試</h2>

<button onclick="loadFoods()">
載入商品
</button>

<div id="foods"></div>

</div>

</div>

<script>

const backendUrl =
"https://delivery-backend-v4.onrender.com";

async function loadFoods(){

    const res =
    await fetch(
        backendUrl +
        "/api/foods"
    );

    const data =
    await res.json();

    document
    .getElementById("foods")
    .innerHTML =
    JSON.stringify(
        data,
        null,
        2
    );

}

</script>

</body>
</html>
