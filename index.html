<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delivery Platform v5 Final</title>
<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
header{background:#ff5722;color:#fff;padding:15px;text-align:center}
.container{max-width:1200px;margin:auto;padding:20px}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:15px}
.hidden{display:none}
input,select,textarea,button{width:100%;padding:10px;margin:5px 0}
button{background:#ff5722;color:white;border:none}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:15px}
</style>
</head>
<body>
<header><h1>🍔 外送平台 v5 Final</h1></header>
<div class="container">
<div class="card">
<h2>此為 Final 基礎版</h2>
<p>已預留會員、店家、騎手、商品、購物車、訂單與評論區塊。</p>
<p>Backend URL 請設定為：https://delivery-backend-v4.onrender.com</p>
</div>

<div id="auth" class="card">
<h2>登入 / 註冊</h2>
<input placeholder="帳號">
<input type="password" placeholder="密碼">
<button>登入</button>
</div>

<div id="customer" class="card">
<h2>會員中心</h2>
<div class="grid" id="foods"></div>
</div>

<div id="merchant" class="card">
<h2>店家中心</h2>
</div>

<div id="rider" class="card">
<h2>騎手中心</h2>
</div>
</div>
</body>
</html>
