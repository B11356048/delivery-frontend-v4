<!DOCTYPE html>
<html lang="zh-TW">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
外送平台 v5
</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<header>

<h1>
🍔 外送平台 v5
</h1>

<button
onclick="logout()">
登出
</button>

</header>

<div class="container">

<!-- 登入註冊 -->

<div
id="auth"
class="card">

<h2>
登入
</h2>

<input
id="loginUser"
placeholder="帳號">

<input
type="password"
id="loginPass"
placeholder="密碼">

<button
onclick="login()">
登入
</button>

<hr>

<h2>註冊</h2>

<select id="regRole" onchange="changeRegisterRole()">

    <option value="customer">
        會員
    </option>

    <option value="merchant">
        店家
    </option>

    <option value="rider">
        騎手
    </option>

</select>

<input
id="regUser"
placeholder="帳號">

<input
type="password"
id="regPass"
placeholder="密碼">

<input
id="regName"
placeholder="姓名">

<input
id="regPhone"
placeholder="電話">

<!-- 店家專區 -->

<div
id="merchantFields"
class="hidden">

<input
id="regStoreName"
placeholder="店家名稱">

<input
id="regTaxId"
placeholder="統一編號">

<input
id="regBusinessProof"
placeholder="營業證明圖片網址">

</div>

<!-- 騎手專區 -->

<div
id="riderFields"
class="hidden">

<select id="regLicenseType">

<option value="">
請選擇駕照種類
</option>

<option value="普通重型機車">
普通重型機車
</option>

<option value="大型重型機車">
大型重型機車
</option>

<option value="普通汽車">
普通汽車
</option>

</select>

<input
id="regLicenseNumber"
placeholder="駕照號碼">

<input
id="regInsuranceImg"
placeholder="強制險圖片網址">

</div>

<button onclick="registerUser()">
註冊
</button>
    </div>
<!-- 會員中心 -->

<div
id="customer"
class="hidden">

<h2>
會員中心
</h2>

<div class="card">

<input
id="foodSearch"
placeholder="搜尋商品">

<button
onclick="loadFoods()">
搜尋
</button>

</div>

<div
id="foods"
class="food-grid">

</div>

<div
class="card">

<h2>
購物車
</h2>

<div id="cart">

</div>

</div>

<div
class="card">

<h2>
我的訂單
</h2>

<div
id="myOrders">

</div>

</div>

</div>

<!-- 店家中心 -->

<div
id="merchant"
class="hidden">

<h2>
店家中心
</h2>

<div
class="card">

<h3>
新增商品
</h3>

<input
id="foodName"
placeholder="商品名稱">

<input
id="foodPrice"
placeholder="價格">

<input
id="foodStock"
placeholder="庫存">

<input
id="foodImage"
placeholder="圖片網址">

<textarea
id="foodDesc"
placeholder="商品介紹">
</textarea>

<button
onclick="addFood()">
新增商品
</button>

</div>

<div
class="card">

<h3>
我的商品
</h3>

<div
id="merchantFoods">

</div>

</div>

<div
class="card">

<h3>
店家訂單
</h3>

<div
id="merchantOrders">

</div>

</div>

</div>

<!-- 騎手中心 -->

<div
id="rider"
class="hidden">

<h2>
騎手中心
</h2>

<div
class="card">

<h3>
待接單
</h3>

<div
id="availableOrders">

</div>

</div>

<div
class="card">

<h3>
我的配送訂單
</h3>

<div
id="riderOrders">

</div>

</div>

</div>

</div>

<script
src="app.js">
</script>

</body>
</html>
